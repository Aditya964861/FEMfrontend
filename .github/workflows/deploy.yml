name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6

        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}

          script: |
            cd ~/frontend/FEMFrotend-main/FEMFrotend-main

            echo "📥 Pulling latest code..."
            git pull origin master

            echo "🔍 Checking package.json..."
            if [ ! -f package.json ]; then
              echo "❌ package.json missing"
              exit 1
            fi

            echo "📦 Installing dependencies..."
            npm ci

            echo "🏗️ Building project..."
            npm run build

            echo "🚀 Starting frontend..."
            pm2 restart frontend || pm2 start serve --name frontend -- -s dist -l 3000

            echo "✅ Deployment done"
